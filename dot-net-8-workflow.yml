name: Build and Publish API to Azure Container Registry for AKS/Tanzu deployment

on:  
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest
    permissions: write-all
    
    env:
        NAMESPACE: glencore.myapplication.api
        IMAGENAME: glencore.myapplication.api
        REPOSITORYNAME: myrepository-api
        ACRNAME: acrdevgbaz1doapis
        DEPLOYMENTENV: appseng-dev
        
    steps:
    - name: Checkout Source
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
  
    - name: Setup .NET Core SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Get Version
      uses: glencore-gbldn-actions/gitversion-action@v1
      id: version

    - name: Debug version
      run: echo "semVer ${{ steps.version.outputs.semVer }}"

    - name: Create nuget.config
      uses: glencore-gbldn-actions/nuget-config@v1
      with:
        url: ${{ secrets.ARTIFACTORY_CLOUD_URL }}
        user: ${{ secrets.ARTIFACTORY_CLOUD_USER }}
        token: ${{ secrets.ARTIFACTORY_CLOUD_ACCESS_TOKEN }}
        repo1: nuget-release
        include-nuget-org: false

    - name: Setup Tools
      if: ${{ hashFiles('.config/dotnet-tools.json') != '' }}
      run: |
        dotnet tool restore
        dotnet tool list

    - name: Restore dependencies
      run: dotnet restore ${{ env.NAMESPACE }}.sln
      
    - name: .NET Build
      run: dotnet build --configuration Release ${{ env.NAMESPACE }}.sln --no-restore
      
    - name: Run Tests 
      run: dotnet test --no-build --collect:"XPlat Code Coverage" --logger:xunit --filter IgnoreOnBuildServer!=true
    
    - name: Generate Code Coverage Report
      run: |
        dotnet tool run reportgenerator \
          "-reports:**/*.cobertura.xml" \
          "-targetdir:./artifacts/coverage" \
          "-assemblyfilters:+*;-*.tests;-*.testing" \
          "-reporttypes:Html;Cobertura" \
          "-reportfile:Cobertura.xml" \
        || \
        dotnet reportgenerator \
          "-reports:**/*.cobertura.xml" \
          "-targetdir:./artifacts/coverage" \
          "-assemblyfilters:+*;-*.tests;-*.testing" \
          "-reporttypes:Html;Cobertura" \
          "-reportfile:Cobertura.xml"

    - name: Publish Code Coverage Summary
      uses: glencore-gbldn-actions/CodeCoverageSummary@v1.3.0
      with:
        filename: ./artifacts/coverage/Cobertura.xml
        badge: true
        fail_below_min: false
        indicators: true
        format: 'markdown'
        output: 'both'

    - name: Add Code Coverage PR Comment
      uses: glencore-gbldn-actions/sticky-pull-request-comment@v2
      if: github.event_name == 'pull_request'
      with:
        append: true
        path: code-coverage-results.md

    - name: Write CC to Job Summary
      run: cat code-coverage-results.md >> $GITHUB_STEP_SUMMARY

    - name: Upload Coverage Report Artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: CoverageReport
        path: artifacts/coverage

    - name: Write Version to Job Summary
      run: echo "${{ steps.version.outputs.semVer }} :rocket:" >> $GITHUB_STEP_SUMMARY

    outputs:
      semVer: ${{ steps.version.outputs.semVer }}

  build-docker-and-push:
    needs: build
    uses: glencore-gbldn/glencore-reusable-wf-build-docker/.github/workflows/wf-build-docker.yaml@v1
    secrets: inherit
    with:
      imageName: ${{ env.IMAGENAME }}
      acrName: ${{ env.ACRNAME }}
      context: .
      dockerfilePath: Dockerfile
      tag: ${{ needs.build.outputs.semVer }}
      autoDeploy: false
      repositoryName: ${{ env.REPOSITORYNAME }}
      deploymentEnv: ${{ env.DEPLOYMENTENV }}
