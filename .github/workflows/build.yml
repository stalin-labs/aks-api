name: Build and Publish API to Azure Container Registry

on:  
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest
    permissions: write-all
    
    env:
        NAMESPACE: Glencore.TacticalAuth.API.Permissions
        
    steps:
    - name: Checkout Source
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
  
    - name: Setup .NET Core SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Get Version
      uses: glencore-gbldn-actions/gitversion-action@v1
      id: version

    - name: Debug version
      run: echo "semVer ${{ steps.version.outputs.semVer }}"
        
    - name: Download Nuget.exe
      uses: glencore-gbldn-actions/artifactory-download@v1
      with:
        url: ${{ secrets.ARTIFACTORY_CLOUD_URL }}
        token: ${{ secrets.ARTIFACTORY_CLOUD_ACCESS_TOKEN }}
        repo: ext-release-local
        artifact: Microsoft/NuGet/4.3.0/nuget.exe
        destination_path: .
        
    - name: Create nuget.config
      uses: glencore-gbldn-actions/nuget-config@v1
      with:
        url: ${{ secrets.ARTIFACTORY_CLOUD_URL }}
        user: ${{ secrets.ARTIFACTORY_CLOUD_USER }}
        token: ${{ secrets.ARTIFACTORY_CLOUD_ACCESS_TOKEN }}
        repo1: nuget-release
        configfile : './NuGet.Config'
        
    - name: Restore dependencies
      run: dotnet restore ${{env.NAMESPACE}}.sln
      
    - name: .NET Build
      run: dotnet build --configuration Release ${{env.NAMESPACE}}.sln --no-restore
      
    - name: Run Tests 
      run: dotnet test --collect:"XPlat Code Coverage" --logger:xunit --filter IgnoreOnBuildServer!=true
    
    - name: Generate Code Coverage Report
      run: |
        dotnet tool restore
        dotnet tool run reportgenerator "-reports:**/*.cobertura.xml" "-targetdir:./artifacts/coverage"
        dotnet tool run reportgenerator "-reports:**/*.cobertura.xml" "-targetdir:./artifacts/coveragereport" -reporttypes:Cobertura -reportfile:Cobertura.xml

    - name: Publish Code Coverage Summary
      uses: glencore-gbldn-actions/CodeCoverageSummary@v1.3.0
      with:
        filename: ./artifacts/coveragereport/Cobertura.xml
        badge: true
        fail_below_min: false
        indicators: true
        format: 'markdown'
        output: 'both'

    - name: Add Code Coverage PR Comment
      uses: glencore-gbldn-actions/sticky-pull-request-comment@v2
      if: github.event_name == 'pull_request'
      with:
        append: true
        path: code-coverage-results.md

    - name: Write CC to Job Summary
      run: cat code-coverage-results.md >> $GITHUB_STEP_SUMMARY

    - name: Upload Coverage Report Artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: CoverageReport
        path: artifacts/coverage

    - name: Write Version to Job Summary
      run: echo "${{ steps.version.outputs.semVer }} :rocket:" >> $GITHUB_STEP_SUMMARY

    outputs:
      semVer: ${{ steps.version.outputs.semVer }}

  build-docker-and-push:
    needs: build
    uses: glencore-gbldn/glencore-reusable-wf-build-docker/.github/workflows/wf-build-docker.yaml@v1
    secrets: inherit
    with:
      imageName: glencore.role.based.permissions.api
      acrName: acrdevgbaz1doapis
      context: .
      dockerfilePath: Dockerfile
      tag: ${{ needs.build.outputs.semVer }}
      autoDeploy: false
      repositoryName: role-based-permissions-api
      deploymentEnv: appseng-dev